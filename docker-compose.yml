version: "3.8"

services:
  # 1. The qdrant Service
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./database/qdrant_storage:/qdrant/storage:z

  # 2. The Offline Pipeline Service
  ingestion-pipeline:
    build:
      context: .
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/output # Mounts local folder to grab the JSONL files if you want them
    environment:
      # We pass the Qdrant URL as an environment variable
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334

  # 3. The Rust API Backend
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
      - backend_target:/app/target
    ports:
      - "8080:8080"
    depends_on:
      qdrant:
        condition: service_started
    environment:
      - QDRANT_URL=http://qdrant:6334
    # The hot-reload command:
    # -c: Clear the screen before each run
    # -w src: Only watch for changes in the 'src' directory
    # -x run: Execute 'cargo run' when a change is detected
    command: cargo watch -w src -x run

# Declare the named volume used by the backend
volumes:
  backend_target:
