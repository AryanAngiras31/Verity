services:
  # 1. The Database Service
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./database/qdrant_storage:/qdrant/storage:z

  # 2. The Offline Pipeline Service
  data_pipeline:
    build:
      context: .
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/output # Mounts local folder to grab the JSONL files if you want them
    environment:
      # We pass the Qdrant URL as an environment variable
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
